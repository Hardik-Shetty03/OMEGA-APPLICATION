<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Omega Control Dashboard</title>
    <!-- Import Google Fonts: Orbitron (Sci-Fi display) & Inter (Clean UI body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/theme.css">
    <style>
        #sidebar {
            width: 260px;
            background-color: #08090f;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px 70px 20px; /* Leave space for bottom status bar */
            height: 100vh;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            margin-bottom: 35px;
            padding-left: 10px;
            gap: 12px;
        }

        .brand-circle {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            box-shadow: 0 0 8px var(--accent-cyan);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .nav-item {
            display: flex;
            align-items: center;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 12px 16px;
            font-size: 0.8rem;
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text-primary);
            background-color: var(--surface-color);
            border-left: 3px solid var(--accent-cyan);
        }

        /* Profile Chip */
        .profile-chip {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: auto;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.95rem;
            color: #050810;
        }

        #main-content {
            flex: 1;
            padding: 30px 40px 70px 40px; /* Space for bottom status bar */
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        /* Top Bar Details */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .top-bar-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .corner-bracket {
            width: 25px;
            height: 15px;
            border: 1px solid var(--border-color);
        }
        .bracket-left {
            border-right: none;
            border-bottom: none;
        }
        .bracket-right {
            border-left: none;
            border-bottom: none;
        }

        .top-bar-indicators {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .live-status {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #top-waveform {
            width: 100px;
            height: 20px;
            background-color: transparent;
        }

        .window-controls {
            display: flex;
            gap: 12px;
        }

        .window-control {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: color 0.2s;
        }

        .window-control:hover {
            color: var(--text-primary);
        }

        /* Bottom Status Bar */
        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background-color: #06080d;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .bottom-connection {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .connection-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--idle-color);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        #bottom-waveform-strip {
            position: absolute;
            left: 200px;
            right: 250px;
            height: 100%;
            background: transparent;
            pointer-events: none;
            opacity: 0.45;
        }

        .status-icons {
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="brand">
            <div class="brand-circle"></div>
            <h2 class="display-title">OMEGA</h2>
        </div>
        <nav style="display: flex; flex-direction: column; gap: 8px;">
            <div class="nav-item active" data-page="home">Home</div>
            <div class="nav-item" data-page="commands">Commands</div>
            <div class="nav-item" data-page="animations">Animations</div>
            <div class="nav-item" data-page="integrations">Integrations</div>
            <div class="nav-item" data-page="settings">Settings</div>
        </nav>
        
        <div class="profile-chip">
            <div class="avatar">O</div>
            <div>
                <h4 style="font-size: 0.8rem; font-weight: 700;" id="profile-name">Developer</h4>
                <p style="font-size: 0.65rem; color: var(--text-secondary); margin-top: 2px;" id="greeting-label">System Active</p>
            </div>
        </div>
    </div>
    
    <div id="main-content">
        <div class="top-bar">
            <div class="top-bar-title">
                <div class="corner-bracket bracket-left"></div>
                <h2 class="display-title" style="font-size: 1.1rem; color: var(--text-primary);">SYS.MONITOR</h2>
                <div class="corner-bracket bracket-right"></div>
            </div>
            
            <div class="top-bar-indicators">
                <div class="live-status" id="indicator-state-container">
                    <span id="indicator-state-text" style="color: var(--text-secondary);">SYS_IDLE</span>
                    <canvas id="top-waveform"></canvas>
                </div>
                
                <div class="window-controls">
                    <button class="window-control" id="btn-minimize">&#9472;</button>
                    <button class="window-control" id="btn-close" style="font-size: 1.3rem; line-height: 1;">&times;</button>
                </div>
            </div>
        </div>
        
        <div id="page-container" style="flex: 1; display: flex; flex-direction: column;">
            <!-- Dynamic subpages load here -->
        </div>
    </div>

    <!-- Bottom Status Bar -->
    <div id="bottom-bar">
        <div class="bottom-connection">
            <div class="connection-dot" id="conn-dot"></div>
            <span>ENGINE STATUS: <strong id="conn-text" style="color: var(--text-secondary);">OFFLINE</strong></span>
            <button id="btn-restart-engine" class="hud-button" style="padding: 2px 8px; font-size: 0.6rem; margin-left: 12px; border-radius: 2px; text-transform: uppercase; cursor: pointer; pointer-events: auto;">Reboot AI</button>
        </div>
        
        <canvas id="bottom-waveform-strip"></canvas>
        
        <div class="status-icons">
            <span>SYS_LINK: ACTIVE</span>
            <span>SECURE_BUS_LOCKED</span>
        </div>
    </div>

    <script src="renderer.js"></script>
    <script>
        // Time-of-day greeting updater
        function updateGreeting() {
            const greetingLabel = document.getElementById('greeting-label');
            const hour = new Date().getHours();
            let greeting = 'System Active';
            if (hour < 12) greeting = 'Good Morning';
            else if (hour < 18) greeting = 'Good Afternoon';
            else greeting = 'Good Evening';
            greetingLabel.textContent = greeting;
        }
        updateGreeting();
        setInterval(updateGreeting, 60000);

        // Top bar and bottom bar waveform canvas animations
        const topCanvas = document.getElementById('top-waveform');
        const topCtx = topCanvas.getContext('2d');
        const bottomCanvas = document.getElementById('bottom-waveform-strip');
        const bottomCtx = bottomCanvas.getContext('2d');

        let animState = 'idle'; // idle, listening, processing, speaking
        let wavePhase = 0;

        function resizeCanvases() {
            topCanvas.width = 100;
            topCanvas.height = 20;
            bottomCanvas.width = bottomCanvas.parentElement.clientWidth - 450;
            bottomCanvas.height = 40;
        }
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);

        // State changes handler for canvas animation presets
        document.addEventListener('omega:state-change', (e) => {
            const state = e.detail;
            animState = state;
            
            const stateText = document.getElementById('indicator-state-text');
            const connDot = document.getElementById('conn-dot');
            const connText = document.getElementById('conn-text');
            
            if (state === 'offline') {
                stateText.textContent = 'SYS_OFFLINE';
                stateText.style.color = 'var(--error-color)';
                connDot.style.backgroundColor = 'var(--error-color)';
                connDot.style.boxShadow = '0 0 8px var(--error-color)';
                connText.textContent = 'OFFLINE';
                connText.style.color = 'var(--error-color)';
            } else {
                connDot.style.backgroundColor = 'var(--success-color)';
                connDot.style.boxShadow = '0 0 8px var(--success-color)';
                connText.textContent = 'ONLINE';
                connText.style.color = 'var(--success-color)';
                
                if (state === 'idle') {
                    stateText.textContent = 'SYS_READY';
                    stateText.style.color = 'var(--text-secondary)';
                } else if (state === 'listening') {
                    stateText.textContent = 'SYS_LISTENING';
                    stateText.style.color = 'var(--accent-cyan)';
                } else if (state === 'processing') {
                    stateText.textContent = 'SYS_PROCESSING';
                    stateText.style.color = 'var(--processing-color)';
                } else if (state === 'speaking') {
                    stateText.textContent = 'SYS_SPEAKING';
                    stateText.style.color = 'var(--accent-violet)';
                }
            }
        });

        // Loop animation drawing
        function drawWaveforms() {
            requestAnimationFrame(drawWaveforms);
            
            topCtx.clearRect(0, 0, topCanvas.width, topCanvas.height);
            bottomCtx.clearRect(0, 0, bottomCanvas.width, bottomCanvas.height);
            
            wavePhase += 0.08;
            
            // 1. Draw top bar mini waveform
            topCtx.beginPath();
            topCtx.lineWidth = 1.5;
            
            let color = '#4a4e5c'; // idle / offline
            let amp = 2;
            let freq = 0.15;
            let speed = 0.05;

            if (animState === 'listening') {
                color = '#22d3ee';
                amp = 8;
                freq = 0.35;
                speed = 0.15;
            } else if (animState === 'speaking') {
                color = '#b98cff';
                amp = 6;
                freq = 0.22;
                speed = 0.08;
            } else if (animState === 'processing') {
                color = '#e040fb';
                amp = 4;
                freq = 0.5;
                speed = 0.12;
            }
            
            topCtx.strokeStyle = color;
            for (let x = 0; x < topCanvas.width; x++) {
                const y = topCanvas.height / 2 + Math.sin(x * freq + wavePhase * speed * 10) * amp * (0.3 + 0.7 * Math.sin(x * 0.03));
                if (x === 0) topCtx.moveTo(x, y);
                else topCtx.lineTo(x, y);
            }
            topCtx.stroke();

            // 2. Draw bottom bar ambient full width waveform
            bottomCtx.beginPath();
            bottomCtx.lineWidth = 1;
            bottomCtx.strokeStyle = 'rgba(34, 211, 238, 0.25)';
            
            let bAmp = 4;
            let bFreq = 0.015;
            
            if (animState === 'listening') {
                bAmp = 12;
                bFreq = 0.035;
                bottomCtx.strokeStyle = 'rgba(34, 211, 238, 0.45)';
            } else if (animState === 'speaking') {
                bAmp = 8;
                bFreq = 0.02;
                bottomCtx.strokeStyle = 'rgba(185, 140, 255, 0.45)';
            }
            
            for (let x = 0; x < bottomCanvas.width; x++) {
                const y = bottomCanvas.height / 2 + Math.sin(x * bFreq + wavePhase) * bAmp;
                if (x === 0) bottomCtx.moveTo(x, y);
                else bottomCtx.lineTo(x, y);
            }
            bottomCtx.stroke();
        }
        drawWaveforms();

        document.getElementById('btn-restart-engine').addEventListener('click', () => {
            window.electronAPI.restartEngine();
        });
    </script>
</body>
</html>
